<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dados - Arraste Livre e Gire ao Jogar</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        #rollBtn1, #rollBtn2 {
            position: absolute;
            bottom: 30px;
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        
        #rollBtn1 {
            left: 20%;
            transform: translateX(-50%);
            background: #0066cc;
        }
        
        #rollBtn2 {
            left: 80%;
            transform: translateX(-50%);
            background: #9900cc;
        }
        
        #rollBtn1:hover, #rollBtn2:hover {
            transform: translateX(-50%) scale(1.1);
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            z-index: 100;
            border: 2px solid #00aaff;
        }
        
        #status {
            position: absolute;
            top: 100px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #00aaff;
            padding: 10px 20px;
            border-radius: 10px;
            z-index: 100;
            border: 2px solid #00aaff;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .coordinates {
            position: absolute;
            bottom: 100px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: #00ff00;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 14px;
            z-index: 100;
            border: 1px solid #00aaff;
        }
    </style>
</head>
<body>

    <button id="rollBtn1">🎲 JOGAR DADO AZUL</button>
    <button id="rollBtn2">🎲 JOGAR DADO ROXO</button>
    
    <div id="info">
        🖱️ ARRASTE LIVREMENTE • BOTÕES PARA JOGAR (COM GIRO)
    </div>
    
    <div id="status">👆 Arraste os dados</div>
    <div id="coordinates" class="coordinates">X: 0.00 | Y: 0.00 | Z: 0.00</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/",
                "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- CENA BÁSICA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 4, 8);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- CONTROLES DE CÂMERA ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1, 0);

        // --- LUZ ---
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        light.castShadow = true;
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404060));

        // --- FÍSICA ---
        const world = new CANNON.World({
            gravity: new CANNON.Vec3(0, -15, 0)
        });

        // Material com mais atrito para parar de girar
        const diceMaterial = new CANNON.Material('diceMaterial');
        const contactMaterial = new CANNON.ContactMaterial(diceMaterial, diceMaterial, {
            friction: 0.2,
            restitution: 0.1,
            contactEquationStiffness: 1e7
        });
        world.addContactMaterial(contactMaterial);
        world.defaultContactMaterial = contactMaterial;

        // --- CHÃO ---
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const groundMesh = new THREE.Mesh(groundGeo, groundMat);
        groundMesh.rotation.x = -Math.PI / 2;
        groundMesh.receiveShadow = true;
        scene.add(groundMesh);

        const gridHelper = new THREE.GridHelper(20, 20, 0x00aaff, 0x444444);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        const groundBody = new CANNON.Body({
            type: CANNON.Body.STATIC,
            shape: new CANNON.Plane(),
            material: diceMaterial
        });
        groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        world.addBody(groundBody);

        // --- FUNÇÃO PARA CRIAR TEXTURAS ---
        function createNumberTexture(number, isPurple = false) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            if (isPurple) {
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(0, 0, 256, 256);
                ctx.strokeStyle = '#aa00ff';
                ctx.lineWidth = 8;
                ctx.strokeRect(4, 4, 248, 248);
                ctx.fillStyle = '#ff5555';
                ctx.font = 'Bold 120px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`-${number}`, 128, 128);
            } else {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, 256, 256);
                ctx.strokeStyle = '#0066cc';
                ctx.lineWidth = 8;
                ctx.strokeRect(4, 4, 248, 248);
                ctx.fillStyle = '#0066cc';
                ctx.font = 'Bold 120px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(number, 128, 128);
            }

            return new THREE.CanvasTexture(canvas);
        }

        // --- CRIAR OS DOIS DADOS ---
        const diceGeo = new THREE.BoxGeometry(1, 1, 1);
        
        // Dado 1 (Azul)
        const materials1 = [
            new THREE.MeshStandardMaterial({ map: createNumberTexture(1, false) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(2, false) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(3, false) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(4, false) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(5, false) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(6, false) })
        ];
        
        // Dado 2 (Roxo)
        const materials2 = [
            new THREE.MeshStandardMaterial({ map: createNumberTexture(1, true) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(2, true) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(3, true) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(4, true) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(5, true) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(6, true) })
        ];

        const dice1 = new THREE.Mesh(diceGeo, materials1);
        dice1.castShadow = true;
        dice1.receiveShadow = true;
        scene.add(dice1);

        const dice2 = new THREE.Mesh(diceGeo, materials2);
        dice2.castShadow = true;
        dice2.receiveShadow = true;
        scene.add(dice2);

        // Corpos físicos
        const diceShape = new CANNON.Box(new CANNON.Vec3(0.5, 0.5, 0.5));
        
        const body1 = new CANNON.Body({
            mass: 1,
            shape: diceShape,
            position: new CANNON.Vec3(-2, 3, 0),
            material: diceMaterial,
            linearDamping: 0.1,
            angularDamping: 0.08
        });
        world.addBody(body1);

        const body2 = new CANNON.Body({
            mass: 1,
            shape: diceShape,
            position: new CANNON.Vec3(2, 3, 0),
            material: diceMaterial,
            linearDamping: 0.1,
            angularDamping: 0.08
        });
        world.addBody(body2);

        // --- SISTEMA DE ARRASTO LIVRE ---
        let dragging = false;
        let currentBody = null;
        let currentMesh = null;
        let currentButton = null;
        let dragPlane = new THREE.Plane();
        let dragOffset = new THREE.Vector3();
        let startPoint = new THREE.Vector3();
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const coordsElement = document.getElementById('coordinates');

        function updateCoordinates(pos) {
            coordsElement.innerHTML = `X: ${pos.x.toFixed(2)} | Y: ${pos.y.toFixed(2)} | Z: ${pos.z.toFixed(2)}`;
        }

        function onMouseDown(event) {
            event.preventDefault();
            
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects([dice1, dice2]);
            
            if (intersects.length > 0) {
                const hit = intersects[0];
                
                dragging = true;
                controls.enabled = false;
                
                if (hit.object === dice1) {
                    currentBody = body1;
                    currentMesh = dice1;
                    currentButton = document.getElementById('rollBtn1');
                    document.getElementById('status').innerHTML = '✋ Arrastando DADO AZUL';
                    document.getElementById('status').style.color = '#0066cc';
                    document.getElementById('status').style.borderColor = '#0066cc';
                } else {
                    currentBody = body2;
                    currentMesh = dice2;
                    currentButton = document.getElementById('rollBtn2');
                    document.getElementById('status').innerHTML = '✋ Arrastando DADO ROXO';
                    document.getElementById('status').style.color = '#9900cc';
                    document.getElementById('status').style.borderColor = '#9900cc';
                }
                
                // Desabilita botão
                currentButton.disabled = true;
                
                // Congela física
                currentBody.mass = 0;
                currentBody.updateMassProperties();
                currentBody.velocity.set(0, 0, 0);
                currentBody.angularVelocity.set(0, 0, 0);
                
                // Ponto de clique em 3D
                startPoint.copy(hit.point);
                
                // Cria um plano perpendicular à câmera (arrasto livre)
                const cameraDir = camera.getWorldDirection(new THREE.Vector3());
                dragPlane.setFromNormalAndCoplanarPoint(cameraDir, startPoint);
                
                // Calcula offset
                dragOffset.copy(currentBody.position).sub(new THREE.Vector3(hit.point.x, hit.point.y, hit.point.z));
            }
        }

        function onMouseMove(event) {
            if (!dragging) return;
            event.preventDefault();
            
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const targetPoint = new THREE.Vector3();
            
            if (raycaster.ray.intersectPlane(dragPlane, targetPoint)) {
                targetPoint.add(dragOffset);
                
                // Limites
                targetPoint.x = Math.max(-8, Math.min(8, targetPoint.x));
                targetPoint.y = Math.max(0.2, Math.min(6, targetPoint.y));
                targetPoint.z = Math.max(-8, Math.min(8, targetPoint.z));
                
                currentBody.position.copy(targetPoint);
                updateCoordinates(targetPoint);
            }
        }

        function onMouseUp(event) {
            if (dragging) {
                // Reativa física
                currentBody.mass = 1;
                currentBody.updateMassProperties();
                
                // Pequeno impulso ao soltar (opcional)
                currentBody.velocity.set(
                    (Math.random() - 0.5) * 1,
                    0,
                    (Math.random() - 0.5) * 1
                );
                
                // Reativa botão
                currentButton.disabled = false;
                
                // Limpa estados
                dragging = false;
                currentBody = null;
                currentMesh = null;
                currentButton = null;
                controls.enabled = true;
                
                document.getElementById('status').innerHTML = '👆 Arraste os dados';
                document.getElementById('status').style.color = '#00aaff';
                document.getElementById('status').style.borderColor = '#00aaff';
            }
        }

        // Eventos de touch
        function onTouchStart(event) {
            event.preventDefault();
            const touch = event.touches[0];
            mouse.x = (touch.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(touch.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects([dice1, dice2]);
            
            if (intersects.length > 0) {
                const hit = intersects[0];
                
                dragging = true;
                controls.enabled = false;
                
                if (hit.object === dice1) {
                    currentBody = body1;
                    currentMesh = dice1;
                    currentButton = document.getElementById('rollBtn1');
                    document.getElementById('status').innerHTML = '✋ Arrastando DADO AZUL';
                    document.getElementById('status').style.color = '#0066cc';
                    document.getElementById('status').style.borderColor = '#0066cc';
                } else {
                    currentBody = body2;
                    currentMesh = dice2;
                    currentButton = document.getElementById('rollBtn2');
                    document.getElementById('status').innerHTML = '✋ Arrastando DADO ROXO';
                    document.getElementById('status').style.color = '#9900cc';
                    document.getElementById('status').style.borderColor = '#9900cc';
                }
                
                currentButton.disabled = true;
                
                currentBody.mass = 0;
                currentBody.updateMassProperties();
                currentBody.velocity.set(0, 0, 0);
                currentBody.angularVelocity.set(0, 0, 0);
                
                startPoint.copy(hit.point);
                
                const cameraDir = camera.getWorldDirection(new THREE.Vector3());
                dragPlane.setFromNormalAndCoplanarPoint(cameraDir, startPoint);
                
                dragOffset.copy(currentBody.position).sub(new THREE.Vector3(hit.point.x, hit.point.y, hit.point.z));
            }
        }

        function onTouchMove(event) {
            if (!dragging) return;
            event.preventDefault();
            
            const touch = event.touches[0];
            mouse.x = (touch.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(touch.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const targetPoint = new THREE.Vector3();
            
            if (raycaster.ray.intersectPlane(dragPlane, targetPoint)) {
                targetPoint.add(dragOffset);
                
                targetPoint.x = Math.max(-8, Math.min(8, targetPoint.x));
                targetPoint.y = Math.max(0.2, Math.min(6, targetPoint.y));
                targetPoint.z = Math.max(-8, Math.min(8, targetPoint.z));
                
                currentBody.position.copy(targetPoint);
                updateCoordinates(targetPoint);
            }
        }

        function onTouchEnd(event) {
            onMouseUp(event);
        }

        // Registrar eventos
        renderer.domElement.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        
        renderer.domElement.addEventListener('touchstart', onTouchStart);
        window.addEventListener('touchmove', onTouchMove);
        window.addEventListener('touchend', onTouchEnd);
        window.addEventListener('touchcancel', onTouchEnd);

        // --- BOTÕES DE JOGAR (COM GIRO CORRIGIDO) ---
        document.getElementById('rollBtn1').addEventListener('click', () => {
            if (!dragging) {
                // Posição inicial
                body1.position.set(-2, 6, 0);
                
                // Velocidade linear (para lançamento)
                body1.velocity.set(
                    (Math.random() - 0.5) * 8,  // X aleatório
                    5 + Math.random() * 4,       // Y para cima
                    (Math.random() - 0.5) * 8    // Z aleatório
                );
                
                // Velocidade angular MUITO ALTA para girar bastante
                body1.angularVelocity.set(
                    (Math.random() - 0.5) * 70,  // Giro rápido em X
                    (Math.random() - 0.5) * 60,  // Giro rápido em Y
                    (Math.random() - 0.5) * 60   // Giro rápido em Z
                );
                
                // Rotação inicial aleatória
                body1.quaternion.set(
                    Math.random() * Math.PI,
                    Math.random() * Math.PI,
                    Math.random() * Math.PI,
                    1
                );
            }
        });

        document.getElementById('rollBtn2').addEventListener('click', () => {
            if (!dragging) {
                // Posição inicial
                body2.position.set(2, 6, 0);
                
                // Velocidade linear
                body2.velocity.set(
                    (Math.random() - 0.5) * 8,
                    5 + Math.random() * 4,
                    (Math.random() - 0.5) * 8
                );
                
                // Velocidade angular MUITO ALTA
                body2.angularVelocity.set(
                    (Math.random() - 0.5) * 30,
                    (Math.random() - 0.5) * 30,
                    (Math.random() - 0.5) * 30
                );
                
                // Rotação inicial aleatória
                body2.quaternion.set(
                    Math.random() * Math.PI,
                    Math.random() * Math.PI,
                    Math.random() * Math.PI,
                    1
                );
            }
        });

        // --- ANIMAÇÃO ---
        function animate() {
            requestAnimationFrame(animate);

            if (!dragging) {
                world.step(1/60);
            }

            // Sincroniza posições e rotações
            dice1.position.copy(body1.position);
            dice1.quaternion.copy(body1.quaternion);
            
            dice2.position.copy(body2.position);
            dice2.quaternion.copy(body2.quaternion);

            // Atualiza coordenadas
            if (!dragging && body1) {
                updateCoordinates(body1.position);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // --- RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Lançamento inicial para mostrar o giro
        setTimeout(() => {
            body1.position.set(-2, 6, 0);
            body1.velocity.set(1, 6, 1);
            body1.angularVelocity.set(15, 20, 10);
            
            body2.position.set(2, 6, 0);
            body2.velocity.set(-1, 6, -1);
            body2.angularVelocity.set(-20, 15, -15);
        }, 500);
    </script>
</body>
</html>
