<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dois Dados - Positivo e Negativo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        
        /* Botões de jogar */
        .roll-btn {
            position: absolute;
            bottom: 30px;
            padding: 16px 40px;
            font-size: 24px;
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            border: 3px solid rgba(255,255,255,0.3);
            z-index: 30;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 200px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        #rollBtn1 {
            left: 20%;
            transform: translateX(-50%);
            background: #00aaff;
        }
        
        #rollBtn2 {
            left: 80%;
            transform: translateX(-50%);
            background: #aa00ff;
        }
        
        .roll-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        
        #rollBtn1:active {
            background: #0088cc;
        }
        
        #rollBtn2:active {
            background: #8800cc;
        }
        
        .roll-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        /* Painel de instruções */
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            font-size: 16px;
            border: 2px solid #00aaff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 20;
            text-align: center;
            pointer-events: none;
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* Indicadores de segurar */
        .grabIndicator {
            position: absolute;
            top: 100px;
            padding: 12px 25px;
            border-radius: 50px;
            border: 2px solid;
            font-size: 18px;
            font-weight: bold;
            z-index: 40;
            backdrop-filter: blur(5px);
            text-align: center;
            pointer-events: none;
            transition: all 0.3s;
            opacity: 0;
            transform: scale(0.8);
        }
        
        #grabIndicator1 {
            right: 30px;
            background: rgba(0, 0, 0, 0.7);
            border-color: #00aaff;
            color: white;
        }
        
        #grabIndicator2 {
            left: 30px;
            background: rgba(0, 0, 0, 0.7);
            border-color: #aa00ff;
            color: white;
        }
        
        .grabIndicator.active {
            opacity: 1;
            transform: scale(1);
        }
        
        #grabIndicator1.active {
            background: #00aaff;
            color: black;
            box-shadow: 0 0 30px #00aaff;
        }
        
        #grabIndicator2.active {
            background: #aa00ff;
            color: white;
            box-shadow: 0 0 30px #aa00ff;
        }
        
        /* Botão de resetar câmera */
        #resetCamera {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00aaff;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        #resetCamera:hover {
            background: #00aaff;
            transform: translateX(-50%) scale(1.1);
        }
        
        /* Responsividade */
        @media (max-width: 768px) {
            .roll-btn {
                bottom: 80px;
                padding: 14px 20px;
                font-size: 18px;
                min-width: 140px;
            }
            
            #rollBtn1 { left: 25%; }
            #rollBtn2 { left: 75%; }
            
            .grabIndicator {
                top: auto;
                bottom: 150px;
                font-size: 14px;
                padding: 8px 15px;
            }
            
            #grabIndicator1 { right: 15px; }
            #grabIndicator2 { left: 15px; }
            
            #resetCamera {
                top: 80px;
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <button id="rollBtn1" class="roll-btn">🎲 DADO +</button>
    <button id="rollBtn2" class="roll-btn">🎲 DADO -</button>
    
    <div id="info">
        Arraste os dados com o mouse/dedo • Botões para jogar • Scroll para zoom
    </div>
    
    <!-- Indicadores de segurar -->
    <div id="grabIndicator1" class="grabIndicator">✋ SEGURANDO +</div>
    <div id="grabIndicator2" class="grabIndicator">✋ SEGURANDO -</div>
    
    <!-- Botão reset câmera -->
    <div id="resetCamera">⟲</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/",
                "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Configurações iniciais ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 5, 10);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- Controles (Orbit) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minDistance = 5;
        controls.maxDistance = 20;
        controls.target.set(0, 1, 0);

        // --- Iluminação ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(5, 12, 8);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);

        // Luz colorida para cada lado
        const blueLight = new THREE.PointLight(0x00aaff, 0.5);
        blueLight.position.set(3, 3, 3);
        scene.add(blueLight);

        const purpleLight = new THREE.PointLight(0xaa00ff, 0.5);
        purpleLight.position.set(-3, 3, -3);
        scene.add(purpleLight);

        // --- Mundo Físico ---
        const world = new CANNON.World({
            gravity: new CANNON.Vec3(0, -15, 0)
        });
        
        const defaultMaterial = new CANNON.Material('default');
        const contactMaterial = new CANNON.ContactMaterial(defaultMaterial, defaultMaterial, {
            friction: 0.5,
            restitution: 0.2
        });
        world.addContactMaterial(contactMaterial);
        world.defaultContactMaterial = contactMaterial;

        // --- Chão ---
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.7 });
        const groundMesh = new THREE.Mesh(groundGeo, groundMat);
        groundMesh.rotation.x = -Math.PI / 2;
        groundMesh.receiveShadow = true;
        scene.add(groundMesh);

        const gridHelper = new THREE.GridHelper(20, 20, 0x00aaff, 0x444444);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        const groundBody = new CANNON.Body({
            type: CANNON.Body.STATIC,
            shape: new CANNON.Plane(),
            material: defaultMaterial
        });
        groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        world.addBody(groundBody);

        // --- Função para criar textura dos dados ---
        function createNumberTexture(number, isNegative = false) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            if (isNegative) {
                // Dado negativo (preto com números vermelhos)
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Borda roxa
                ctx.strokeStyle = '#aa00ff';
                ctx.lineWidth = 12;
                ctx.strokeRect(6, 6, canvas.width - 12, canvas.height - 12);

                // Número vermelho com símbolo negativo
                ctx.fillStyle = '#ff4444';
                ctx.shadowColor = '#aa00ff';
                ctx.shadowBlur = 20;
                ctx.font = 'Bold 200px "Segoe UI", Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Adiciona o sinal de menos antes do número
                const text = `-${Math.abs(number)}`;
                ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            } else {
                // Dado positivo (branco com números azuis)
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, '#f8f8f8');
                gradient.addColorStop(1, '#ffffff');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = '#00aaff';
                ctx.lineWidth = 12;
                ctx.strokeRect(6, 6, canvas.width - 12, canvas.height - 12);

                ctx.fillStyle = '#00aaff';
                ctx.shadowColor = '#00aaff';
                ctx.shadowBlur = 20;
                ctx.font = 'Bold 200px "Segoe UI", Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(number, canvas.width / 2, canvas.height / 2);
            }

            return new THREE.CanvasTexture(canvas);
        }

        // --- Materiais dos dados ---
        // Dado 1 - Positivo (azul)
        const materials1 = [
            new THREE.MeshStandardMaterial({ map: createNumberTexture(2, false) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(5, false) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(3, false) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(4, false) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(1, false) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(6, false) })
        ];

        // Dado 2 - Negativo (roxo com números negativos)
        const materials2 = [
            new THREE.MeshStandardMaterial({ map: createNumberTexture(2, true) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(5, true) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(3, true) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(4, true) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(1, true) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(6, true) })
        ];

        // --- Criar os dois dados ---
        const diceGeo = new THREE.BoxGeometry(1, 1, 1);
        
        // Dado 1
        const diceMesh1 = new THREE.Mesh(diceGeo, materials1);
        diceMesh1.castShadow = true;
        diceMesh1.receiveShadow = true;
        scene.add(diceMesh1);

        // Dado 2
        const diceMesh2 = new THREE.Mesh(diceGeo, materials2);
        diceMesh2.castShadow = true;
        diceMesh2.receiveShadow = true;
        scene.add(diceMesh2);

        // Corpos físicos
        const diceShape = new CANNON.Box(new CANNON.Vec3(0.5, 0.5, 0.5));
        
        const diceBody1 = new CANNON.Body({
            mass: 1,
            shape: diceShape,
            position: new CANNON.Vec3(-2, 3, 0),
            material: defaultMaterial,
            linearDamping: 0.2,
            angularDamping: 0.2
        });
        world.addBody(diceBody1);

        const diceBody2 = new CANNON.Body({
            mass: 1,
            shape: diceShape,
            position: new CANNON.Vec3(2, 3, 0),
            material: defaultMaterial,
            linearDamping: 0.2,
            angularDamping: 0.2
        });
        world.addBody(diceBody2);

        // Bordas decorativas
        const edges1 = new THREE.EdgesGeometry(diceGeo);
        const edges2 = new THREE.EdgesGeometry(diceGeo);
        const line1 = new THREE.LineSegments(edges1, new THREE.LineBasicMaterial({ color: 0x00aaff }));
        const line2 = new THREE.LineSegments(edges2, new THREE.LineBasicMaterial({ color: 0xaa00ff }));
        diceMesh1.add(line1);
        diceMesh2.add(line2);

        // --- Sistema de arrastar para dois dados ---
        const grabIndicator1 = document.getElementById('grabIndicator1');
        const grabIndicator2 = document.getElementById('grabIndicator2');
        const rollBtn1 = document.getElementById('rollBtn1');
        const rollBtn2 = document.getElementById('rollBtn2');
        
        let isDragging1 = false;
        let isDragging2 = false;
        let dragPlane = new THREE.Plane();
        let dragOffset = new THREE.Vector3();
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();

        function onMouseDown(event) {
            event.preventDefault();
            
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects([diceMesh1, diceMesh2]);
            
            if (intersects.length > 0) {
                const hit = intersects[0];
                if (hit.object === diceMesh1) {
                    startDragging(1, hit.point);
                } else if (hit.object === diceMesh2) {
                    startDragging(2, hit.point);
                }
            }
        }

        function onTouchStart(event) {
            event.preventDefault();
            const touch = event.touches[0];
            
            mouse.x = (touch.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(touch.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects([diceMesh1, diceMesh2]);
            
            if (intersects.length > 0) {
                const hit = intersects[0];
                if (hit.object === diceMesh1) {
                    startDragging(1, hit.point);
                } else if (hit.object === diceMesh2) {
                    startDragging(2, hit.point);
                }
            }
        }

        function startDragging(diceNumber, point) {
            if (diceNumber === 1) {
                isDragging1 = true;
                rollBtn1.disabled = true;
                grabIndicator1.classList.add('active');
                
                diceBody1.mass = 0;
                diceBody1.updateMassProperties();
                diceBody1.velocity.set(0, 0, 0);
                diceBody1.angularVelocity.set(0, 0, 0);
                
                dragOffset.copy(diceBody1.position).sub(new CANNON.Vec3(point.x, point.y, point.z));
            } else {
                isDragging2 = true;
                rollBtn2.disabled = true;
                grabIndicator2.classList.add('active');
                
                diceBody2.mass = 0;
                diceBody2.updateMassProperties();
                diceBody2.velocity.set(0, 0, 0);
                diceBody2.angularVelocity.set(0, 0, 0);
                
                dragOffset.copy(diceBody2.position).sub(new CANNON.Vec3(point.x, point.y, point.z));
            }
            
            controls.enabled = false;
            
            const normal = camera.getWorldDirection(new THREE.Vector3());
            dragPlane.setFromNormalAndCoplanarPoint(normal, point);
        }

        function onMouseMove(event) {
            if (!isDragging1 && !isDragging2) return;
            event.preventDefault();
            
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            updateDragPosition();
        }

        function onTouchMove(event) {
            if (!isDragging1 && !isDragging2) return;
            event.preventDefault();
            
            const touch = event.touches[0];
            mouse.x = (touch.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(touch.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            updateDragPosition();
        }

        function updateDragPosition() {
            raycaster.setFromCamera(mouse, camera);
            const targetPoint = new THREE.Vector3();
            
            if (raycaster.ray.intersectPlane(dragPlane, targetPoint)) {
                targetPoint.add(dragOffset);
                
                targetPoint.x = Math.max(-8, Math.min(8, targetPoint.x));
                targetPoint.y = Math.max(0.5, Math.min(5, targetPoint.y));
                targetPoint.z = Math.max(-8, Math.min(8, targetPoint.z));
                
                if (isDragging1) {
                    diceBody1.position.copy(targetPoint);
                } else if (isDragging2) {
                    diceBody2.position.copy(targetPoint);
                }
            }
        }

        function onMouseUp(event) {
            if (isDragging1) {
                isDragging1 = false;
                rollBtn1.disabled = false;
                grabIndicator1.classList.remove('active');
                
                diceBody1.mass = 1;
                diceBody1.updateMassProperties();
                diceBody1.velocity.set(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 1,
                    (Math.random() - 0.5) * 2
                );
                diceBody1.angularVelocity.set(
                    (Math.random() - 0.5) * 5,
                    (Math.random() - 0.5) * 5,
                    (Math.random() - 0.5) * 5
                );
            }
            
            if (isDragging2) {
                isDragging2 = false;
                rollBtn2.disabled = false;
                grabIndicator2.classList.remove('active');
                
                diceBody2.mass = 1;
                diceBody2.updateMassProperties();
                diceBody2.velocity.set(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 1,
                    (Math.random() - 0.5) * 2
                );
                diceBody2.angularVelocity.set(
                    (Math.random() - 0.5) * 5,
                    (Math.random() - 0.5) * 5,
                    (Math.random() - 0.5) * 5
                );
            }
            
            controls.enabled = true;
        }

        // Event listeners
        renderer.domElement.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        
        renderer.domElement.addEventListener('touchstart', onTouchStart);
        window.addEventListener('touchmove', onTouchMove);
        window.addEventListener('touchend', onMouseUp);

        // --- Botões de jogar ---
        document.getElementById('rollBtn1').addEventListener('click', () => {
            if (isDragging1) return;
            diceBody1.position.set(-2, 6, 0);
            diceBody1.velocity.set(
                (Math.random() - 0.5) * 6,
                4 + Math.random() * 3,
                (Math.random() - 0.5) * 6
            );
            diceBody1.angularVelocity.set(
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20
            );
        });

        document.getElementById('rollBtn2').addEventListener('click', () => {
            if (isDragging2) return;
            diceBody2.position.set(2, 6, 0);
            diceBody2.velocity.set(
                (Math.random() - 0.5) * 6,
                4 + Math.random() * 3,
                (Math.random() - 0.5) * 6
            );
            diceBody2.angularVelocity.set(
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20
            );
        });

        // --- Reset câmera ---
        document.getElementById('resetCamera').addEventListener('click', () => {
            camera.position.set(8, 5, 10);
            controls.target.set(0, 1, 0);
            controls.update();
        });

        // --- Animação ---
        function animate() {
            requestAnimationFrame(animate);

            if (!isDragging1 && !isDragging2) {
                world.step(1 / 60);
            }

            diceMesh1.position.copy(diceBody1.position);
            diceMesh1.quaternion.copy(diceBody1.quaternion);
            
            diceMesh2.position.copy(diceBody2.position);
            diceMesh2.quaternion.copy(diceBody2.quaternion);

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // --- Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Posição inicial ---
        diceBody1.position.set(-2, 3, 0);
        diceBody2.position.set(2, 3, 0);
    </script>
</body>
</html>
