<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dois Dados - Arraste Funcionando</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        
        /* Botões de jogar */
        .roll-btn {
            position: absolute;
            bottom: 30px;
            padding: 16px 40px;
            font-size: 24px;
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            border: 3px solid rgba(255,255,255,0.3);
            z-index: 30;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 200px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        #rollBtn1 {
            left: 20%;
            transform: translateX(-50%);
            background: #00aaff;
        }
        
        #rollBtn2 {
            left: 80%;
            transform: translateX(-50%);
            background: #aa00ff;
        }
        
        .roll-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        
        #rollBtn1:active {
            background: #0088cc;
        }
        
        #rollBtn2:active {
            background: #8800cc;
        }
        
        .roll-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        /* Painel de instruções */
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            font-size: 16px;
            border: 2px solid #00aaff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 20;
            text-align: center;
            pointer-events: none;
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* Indicadores de segurar */
        .grabIndicator {
            position: absolute;
            top: 100px;
            padding: 12px 25px;
            border-radius: 50px;
            border: 2px solid;
            font-size: 18px;
            font-weight: bold;
            z-index: 40;
            backdrop-filter: blur(5px);
            text-align: center;
            pointer-events: none;
            transition: all 0.3s;
            opacity: 0;
            transform: scale(0.8);
        }
        
        #grabIndicator1 {
            right: 30px;
            background: rgba(0, 0, 0, 0.7);
            border-color: #00aaff;
            color: white;
        }
        
        #grabIndicator2 {
            left: 30px;
            background: rgba(0, 0, 0, 0.7);
            border-color: #aa00ff;
            color: white;
        }
        
        .grabIndicator.active {
            opacity: 1;
            transform: scale(1);
        }
        
        #grabIndicator1.active {
            background: #00aaff;
            color: black;
            box-shadow: 0 0 30px #00aaff;
        }
        
        #grabIndicator2.active {
            background: #aa00ff;
            color: white;
            box-shadow: 0 0 30px #aa00ff;
        }
        
        /* Botão de resetar câmera */
        #resetCamera {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00aaff;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        #resetCamera:hover {
            background: #00aaff;
            transform: translateX(-50%) scale(1.1);
        }
        
        @media (max-width: 768px) {
            .roll-btn {
                bottom: 80px;
                padding: 14px 20px;
                font-size: 18px;
                min-width: 140px;
            }
            
            #rollBtn1 { left: 25%; }
            #rollBtn2 { left: 75%; }
            
            .grabIndicator {
                top: auto;
                bottom: 150px;
                font-size: 14px;
                padding: 8px 15px;
            }
            
            #grabIndicator1 { right: 15px; }
            #grabIndicator2 { left: 15px; }
            
            #resetCamera {
                top: 80px;
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <button id="rollBtn1" class="roll-btn">🎲 DADO +</button>
    <button id="rollBtn2" class="roll-btn">🎲 DADO -</button>
    
    <div id="info">
        🖱️ Clique e arraste os dados • Botões para jogar • Scroll para zoom • ⟲ Reset
    </div>
    
    <div id="grabIndicator1" class="grabIndicator">✋ SEGURANDO +</div>
    <div id="grabIndicator2" class="grabIndicator">✋ SEGURANDO -</div>
    
    <div id="resetCamera">⟲</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/",
                "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Configurações iniciais ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 5, 10);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Controles ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.target.set(0, 1, 0);

        // --- Iluminação ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(5, 12, 8);
        mainLight.castShadow = true;
        scene.add(mainLight);

        // --- Mundo Físico ---
        const world = new CANNON.World({
            gravity: new CANNON.Vec3(0, -15, 0)
        });
        
        const defaultMaterial = new CANNON.Material('default');
        const contactMaterial = new CANNON.ContactMaterial(defaultMaterial, defaultMaterial, {
            friction: 0.5,
            restitution: 0.2
        });
        world.addContactMaterial(contactMaterial);
        world.defaultContactMaterial = contactMaterial;

        // --- Chão ---
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a });
        const groundMesh = new THREE.Mesh(groundGeo, groundMat);
        groundMesh.rotation.x = -Math.PI / 2;
        groundMesh.receiveShadow = true;
        scene.add(groundMesh);

        const gridHelper = new THREE.GridHelper(20, 20, 0x00aaff, 0x444444);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        const groundBody = new CANNON.Body({
            type: CANNON.Body.STATIC,
            shape: new CANNON.Plane()
        });
        groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        world.addBody(groundBody);

        // --- Função para criar textura ---
        function createNumberTexture(number, isNegative = false) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            if (isNegative) {
                // Dado negativo
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#aa00ff';
                ctx.lineWidth = 16;
                ctx.strokeRect(8, 8, canvas.width - 16, canvas.height - 16);
                ctx.fillStyle = '#ff4444';
                ctx.font = 'Bold 240px "Segoe UI", Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`-${number}`, canvas.width / 2, canvas.height / 2);
            } else {
                // Dado positivo
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#00aaff';
                ctx.lineWidth = 16;
                ctx.strokeRect(8, 8, canvas.width - 16, canvas.height - 16);
                ctx.fillStyle = '#0066cc';
                ctx.font = 'Bold 240px "Segoe UI", Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(number, canvas.width / 2, canvas.height / 2);
            }

            return new THREE.CanvasTexture(canvas);
        }

        // --- Materiais dos dados ---
        const materials1 = [
            new THREE.MeshStandardMaterial({ map: createNumberTexture(1, false) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(2, false) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(3, false) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(4, false) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(5, false) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(6, false) })
        ];

        const materials2 = [
            new THREE.MeshStandardMaterial({ map: createNumberTexture(1, true) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(2, true) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(3, true) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(4, true) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(5, true) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture(6, true) })
        ];

        // --- Criar os dados ---
        const diceGeo = new THREE.BoxGeometry(1, 1, 1);
        
        const diceMesh1 = new THREE.Mesh(diceGeo, materials1);
        diceMesh1.castShadow = true;
        diceMesh1.receiveShadow = true;
        scene.add(diceMesh1);

        const diceMesh2 = new THREE.Mesh(diceGeo, materials2);
        diceMesh2.castShadow = true;
        diceMesh2.receiveShadow = true;
        scene.add(diceMesh2);

        // Corpos físicos
        const diceShape = new CANNON.Box(new CANNON.Vec3(0.5, 0.5, 0.5));
        
        const diceBody1 = new CANNON.Body({
            mass: 1,
            shape: diceShape,
            position: new CANNON.Vec3(-2, 3, 0),
            material: defaultMaterial
        });
        world.addBody(diceBody1);

        const diceBody2 = new CANNON.Body({
            mass: 1,
            shape: diceShape,
            position: new CANNON.Vec3(2, 3, 0),
            material: defaultMaterial
        });
        world.addBody(diceBody2);

        // Bordas
        const edges1 = new THREE.EdgesGeometry(diceGeo);
        const edges2 = new THREE.EdgesGeometry(diceGeo);
        const line1 = new THREE.LineSegments(edges1, new THREE.LineBasicMaterial({ color: 0x00aaff }));
        const line2 = new THREE.LineSegments(edges2, new THREE.LineBasicMaterial({ color: 0xaa00ff }));
        diceMesh1.add(line1);
        diceMesh2.add(line2);

        // --- SISTEMA DE ARRASTAR CORRIGIDO ---
        const grabIndicator1 = document.getElementById('grabIndicator1');
        const grabIndicator2 = document.getElementById('grabIndicator2');
        const rollBtn1 = document.getElementById('rollBtn1');
        const rollBtn2 = document.getElementById('rollBtn2');
        
        let isDragging = false;
        let draggedBody = null;
        let draggedMesh = null;
        let dragIndicator = null;
        let dragButton = null;
        let dragPlane = new THREE.Plane();
        let dragOffset = new THREE.Vector3();
        let dragStartPoint = new THREE.Vector3();
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Eventos de mouse
        renderer.domElement.addEventListener('mousedown', onDragStart);
        window.addEventListener('mousemove', onDragMove);
        window.addEventListener('mouseup', onDragEnd);

        // Eventos de touch
        renderer.domElement.addEventListener('touchstart', onTouchStart);
        window.addEventListener('touchmove', onTouchMove);
        window.addEventListener('touchend', onDragEnd);
        window.addEventListener('touchcancel', onDragEnd);

        function onDragStart(event) {
            event.preventDefault();
            
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            checkDragStart();
        }

        function onTouchStart(event) {
            event.preventDefault();
            const touch = event.touches[0];
            
            mouse.x = (touch.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(touch.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            checkDragStart();
        }

        function checkDragStart() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects([diceMesh1, diceMesh2]);
            
            if (intersects.length > 0) {
                const hit = intersects[0];
                
                if (hit.object === diceMesh1) {
                    startDragging(diceBody1, diceMesh1, grabIndicator1, rollBtn1);
                } else if (hit.object === diceMesh2) {
                    startDragging(diceBody2, diceMesh2, grabIndicator2, rollBtn2);
                }
            }
        }

        function startDragging(body, mesh, indicator, button) {
            isDragging = true;
            draggedBody = body;
            draggedMesh = mesh;
            dragIndicator = indicator;
            dragButton = button;
            
            // Desabilita controles e botões
            controls.enabled = false;
            button.disabled = true;
            indicator.classList.add('active');
            
            // Congela física
            body.mass = 0;
            body.updateMassProperties();
            body.velocity.set(0, 0, 0);
            body.angularVelocity.set(0, 0, 0);
            
            // Pega a posição do clique
            dragStartPoint.copy(mesh.position);
            
            // Cria um plano de arrasto na altura do dado
            dragPlane.setFromNormalAndCoplanarPoint(
                new THREE.Vector3(0, 1, 0), // Plano horizontal
                dragStartPoint
            );
            
            // Calcula offset
            raycaster.setFromCamera(mouse, camera);
            const intersectionPoint = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(dragPlane, intersectionPoint)) {
                dragOffset.copy(dragStartPoint).sub(intersectionPoint);
            }
        }

        function onDragMove(event) {
            if (!isDragging) return;
            event.preventDefault();
            
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            updateDragPosition();
        }

        function onTouchMove(event) {
            if (!isDragging) return;
            event.preventDefault();
            
            const touch = event.touches[0];
            mouse.x = (touch.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(touch.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            updateDragPosition();
        }

        function updateDragPosition() {
            raycaster.setFromCamera(mouse, camera);
            const intersectionPoint = new THREE.Vector3();
            
            if (raycaster.ray.intersectPlane(dragPlane, intersectionPoint)) {
                // Aplica o offset
                const newPos = intersectionPoint.clone().add(dragOffset);
                
                // Limites
                newPos.x = Math.max(-8, Math.min(8, newPos.x));
                newPos.y = Math.max(0.5, Math.min(5, newPos.y));
                newPos.z = Math.max(-8, Math.min(8, newPos.z));
                
                draggedBody.position.copy(newPos);
            }
        }

        function onDragEnd(event) {
            if (!isDragging) return;
            
            // Reativa física
            draggedBody.mass = 1;
            draggedBody.updateMassProperties();
            
            // Pequeno impulso aleatório
            draggedBody.velocity.set(
                (Math.random() - 0.5) * 2,
                0,
                (Math.random() - 0.5) * 2
            );
            
            // Limpa estados
            controls.enabled = true;
            dragButton.disabled = false;
            dragIndicator.classList.remove('active');
            
            isDragging = false;
            draggedBody = null;
            draggedMesh = null;
            dragIndicator = null;
            dragButton = null;
        }

        // --- Botões de jogar ---
        document.getElementById('rollBtn1').addEventListener('click', () => {
            if (isDragging) return;
            diceBody1.position.set(-2, 6, 0);
            diceBody1.velocity.set(
                (Math.random() - 0.5) * 8,
                5 + Math.random() * 4,
                (Math.random() - 0.5) * 8
            );
            diceBody1.angularVelocity.set(
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20
            );
        });

        document.getElementById('rollBtn2').addEventListener('click', () => {
            if (isDragging) return;
            diceBody2.position.set(2, 6, 0);
            diceBody2.velocity.set(
                (Math.random() - 0.5) * 8,
                5 + Math.random() * 4,
                (Math.random() - 0.5) * 8
            );
            diceBody2.angularVelocity.set(
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20
            );
        });

        // --- Reset câmera ---
        document.getElementById('resetCamera').addEventListener('click', () => {
            camera.position.set(8, 5, 10);
            controls.target.set(0, 1, 0);
        });

        // --- Animação ---
        function animate() {
            requestAnimationFrame(animate);

            if (!isDragging) {
                world.step(1 / 60);
            }

            // Sincroniza posições
            diceMesh1.position.copy(diceBody1.position);
            diceMesh1.quaternion.copy(diceBody1.quaternion);
            diceMesh2.position.copy(diceBody2.position);
            diceMesh2.quaternion.copy(diceBody2.quaternion);

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // --- Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Posição inicial
        diceBody1.position.set(-2, 3, 0);
        diceBody2.position.set(2, 3, 0);
    </script>
</body>
</html>
